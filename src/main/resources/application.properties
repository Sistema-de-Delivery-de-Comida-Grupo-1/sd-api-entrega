# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=sd-api-entrega
# ===============================
# DATASOURCE & H2
# ===============================
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.acknowledge-mode=manual
rabbitmq.exchange.entrega=entrega.topic.exchange
rabbitmq.exchange.pedidos=pedidos.topic.exchange
rabbitmq.queue.notificacao=entrega.notificacao.queue
rabbitmq.queue.status=entrega.status.queue
rabbitmq.queue.pedido-novo=entrega.pedido.novo.queue
rabbitmq.routing-key.notificacao=entrega.notificacao.*
rabbitmq.routing-key.status=entrega.status.*
rabbitmq.routing-key.pedido-novo=pedido.criado
spring.rabbitmq.username=myuser
spring.rabbitmq.password=secret

# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.delivery=DEBUG
logging.level.org.springframework.amqp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# SPRINGDOC / SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
