# ===============================
# SPRING APPLICATION
# ===============================
spring.application.name=sd-api-entrega
# ===============================
# DATASOURCE & H2
# ===============================
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Exchanges
rabbitmq.exchange.entrega=entrega.topic.exchange
rabbitmq.exchange.pedidos=event-notificacao

# Queues - saida (notificacao)
rabbitmq.queue.notificacao=entrega.notificacao.queue
rabbitmq.queue.status=entrega.status.queue

# Queues - entrada (recebimento de pedidos do sd-api-pedido)
# Fila ligada ao exchange event-notificacao via Spring Cloud Stream (recebe todos os eventos)
# NOTA: a fila queue.pedido-entrega pertence ao sd-api-notificacao; sd-api-entrega NAO consome dela
rabbitmq.queue.pedido-novo=entrega.pedido.novo.queue

# Routing key de entrada (binding com event-notificacao)
rabbitmq.routing-key.pedido-novo=#

# Routing keys de saida - binding patterns (usados para declarar as filas)
rabbitmq.routing-key.notificacao=entrega.notificacao.*
rabbitmq.routing-key.status=entrega.status.*

# Routing keys de saida - valores especificos usados ao publicar mensagens
rabbitmq.routing-key.notificacao.saida=entrega.notificacao.saida
rabbitmq.routing-key.notificacao.entregue=entrega.notificacao.entregue
rabbitmq.routing-key.status.atualizado=entrega.status.atualizado

spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ===============================
# SERVER
# ===============================
server.port=8087
server.servlet.context-path=/api

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.delivery=DEBUG
logging.level.org.springframework.amqp=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# SPRINGDOC / SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
